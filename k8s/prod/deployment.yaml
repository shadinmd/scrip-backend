apiVersion: apps/v1
kind: Deployment
metadata:
  name: scrip-backend-prod
  namespace: scrip-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: scrip-backend-prod
  template:
    metadata:
      labels:
        app: scrip-backend-prod
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: backend
          image: ghcr.io/shadinmd/scrip-backend:3cc2ca2d997bae3ee52ba9ff343490e63984a214
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          env:
            - name: PORT
              valueFrom:
                secretKeyRef:
                  name: scrip-secrets
                  key: port
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: scrip-secrets
                  key: db-host
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: scrip-secrets
                  key: db-port
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: scrip-secrets
                  key: db-name
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: scrip-secrets
                  key: db-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: scrip-secrets
                  key: db-password
            - name: ACCESS_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: scrip-secrets
                  key: access-token-secret
            - name: REFRESH_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: scrip-secrets
                  key: refresh-token-secret
