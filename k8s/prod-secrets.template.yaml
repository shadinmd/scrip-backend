# Runtime Secrets for Scrip Backend (PROD)
# Base64 encode values: echo -n "value" | base64

---
apiVersion: v1
kind: Secret
metadata:
  name: scrip-secrets-prod
  namespace: scrip-prod
type: Opaque
data:
  port: <base64-encoded-8000>
  db-host: <base64-encoded-db-service-prod>
  db-port: <base64-encoded-5432>
  db-name: <base64-encoded-scrip>
  db-user: <base64-encoded-username>
  db-password: <base64-encoded-password>
  access-token-secret: <base64-encoded-secret>
  refresh-token-secret: <base64-encoded-secret>

---
# Secret for pulling images from GHCR
apiVersion: v1
kind: Secret
metadata:
  name: ghcr-secret
  namespace: scrip-prod
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: <base64-encoded-docker-config>
