apiVersion: apps/v1
kind: Deployment
metadata:
  name: scrip-backend
  namespace: scrip-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scrip-backend
  template:
    metadata:
      labels:
        app: scrip-backend
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: backend
          image: ghcr.io/shadinmd/scrip-backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: PORT
              valueFrom:
                secretKeyRef:
                  name: scrip-secrets
                  key: port
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: scrip-secrets
                  key: db-host
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: scrip-secrets
                  key: db-port
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: scrip-secrets
                  key: db-name
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: scrip-secrets
                  key: db-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: scrip-secrets
                  key: db-password
            - name: ACCESS_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: scrip-secrets
                  key: access-token-secret
            - name: REFRESH_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: scrip-secrets
                  key: refresh-token-secret
