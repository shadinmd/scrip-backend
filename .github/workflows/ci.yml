name: Backend CI/CD

on:
  push:
    branches:
      - main
      - dev
    paths-ignore:
      - "k8s/**"

  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: shadinmd
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/shadinmd/scrip-backend:${{ github.sha }}
            ghcr.io/shadinmd/scrip-backend:latest

  update-manifest:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.email "ci@scrip.local"
          git config --global user.name "github-actions"

      - name: Update Dev Manifest
        if: github.ref == 'refs/heads/dev'
        run: |
          sed -i 's|image: ghcr.io/.*/scrip-backend:.*|image: ghcr.io/shadinmd/scrip-backend:${{ github.sha }}|' k8s/dev/deployment.yaml

          git add .
          git commit -m "dev: update image to ${{ github.sha }}" || echo "No changes"
          git push

      - name: Update Prod Manifest
        if: github.ref == 'refs/heads/main'
        run: |
          sed -i 's|image: ghcr.io/.*/scrip-backend:.*|image: ghcr.io/shadinmd/scrip-backend:${{ github.sha }}|' k8s/prod/deployment.yaml

          git add .
          git commit -m "prod: update image to ${{ github.sha }}" || echo "No changes"
          git push
